<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f3ea"/>
      <stop offset="100%" stop-color="#eef5e8"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f5c42"/>
      <stop offset="100%" stop-color="#2d7a58"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" x2="1">
      <stop offset="0%" stop-color="#8b3f1f"/>
      <stop offset="100%" stop-color="#b75a2b"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #19352a; }
      .subtitle { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #345447; }
      .cardTitle { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #fff; }
      .cardBody { font: 500 16px 'Helvetica Neue', Arial, sans-serif; fill: #f4fbf7; }
      .lightTitle { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #19352a; }
      .lightBody { font: 500 15px 'Helvetica Neue', Arial, sans-serif; fill: #385245; }
      .note { font: 600 14px 'Helvetica Neue', Arial, sans-serif; fill: #6a4d21; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#27483b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#335748"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="64" y="72" class="title">산불 위험 조기탐지 자율검증 시스템 아키텍처</text>
  <text x="64" y="106" class="subtitle">공개 산불통계 + NIFOS 산악기상 + 멀티에이전트 검증 파이프라인으로 재현과 운영지표를 동시에 산출</text>

  <rect x="64" y="154" rx="26" ry="26" width="260" height="150" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="92" y="198" class="cardTitle">1. 데이터 수집</text>
  <text x="92" y="232" class="cardBody">산림청 산불통계 CSV</text>
  <text x="92" y="258" class="cardBody">NIFOS 산악기상 API</text>
  <text x="92" y="284" class="cardBody">2022~2025 / 2~4월 / 시군구×일 패널</text>

  <rect x="372" y="154" rx="26" ry="26" width="260" height="150" fill="url(#cardA)" filter="url(#shadow)"/>
  <text x="400" y="198" class="cardTitle">2. 재현 모델</text>
  <text x="400" y="232" class="cardBody">SMOTE 1:1(train only)</text>
  <text x="400" y="258" class="cardBody">LR / RF / GB / XGBoost 비교</text>
  <text x="400" y="284" class="cardBody">최적모델: Logistic Regression</text>

  <rect x="680" y="154" rx="26" ry="26" width="260" height="150" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="708" y="198" class="cardTitle">3. 자율검증 운영점</text>
  <text x="708" y="232" class="cardBody">하위 40% 자동검증 종결</text>
  <text x="708" y="258" class="cardBody">상위 60% 관제 우선검토 큐</text>
  <text x="708" y="284" class="cardBody">놓친 산불과 절감효과 동시 공개</text>

  <rect x="988" y="154" rx="26" ry="26" width="228" height="150" fill="url(#cardB)" filter="url(#shadow)"/>
  <text x="1016" y="198" class="cardTitle">4. 서비스 출력</text>
  <text x="1016" y="232" class="cardBody">리스크 히트맵</text>
  <text x="1016" y="258" class="cardBody">검토량-놓침 곡선</text>
  <text x="1016" y="284" class="cardBody">Top-K 집중도 대시보드</text>

  <line x1="324" y1="229" x2="372" y2="229" stroke="#335748" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="632" y1="229" x2="680" y2="229" stroke="#335748" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="940" y1="229" x2="988" y2="229" stroke="#335748" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="64" y="364" rx="28" ry="28" width="1152" height="300" fill="#ffffff" stroke="#d7e2d8" stroke-width="2" filter="url(#shadow)"/>
  <text x="98" y="412" class="lightTitle">멀티에이전트 자율검증 파이프라인</text>
  <text x="98" y="444" class="lightBody">Spec Committee가 재현 기준과 운영지표를 사전고정하고, Data Bureau가 공공데이터 출처와 결측 범위를 기록한다.</text>
  <text x="98" y="472" class="lightBody">Prediction Lab이 모델 성능과 지역 편차를 산출한 뒤, Disposition Agent가 자동검증율·검토시간·놓친 산불 교환관계를 계산한다.</text>
  <text x="98" y="500" class="lightBody">Evaluation Gate는 산식·분모·정직성 규칙을 검증하고, Report Desk는 승인된 수치만 사업기획서와 대시보드에 반영한다.</text>

  <rect x="98" y="544" rx="18" ry="18" width="172" height="84" fill="#eef5ee" stroke="#c9d9cb"/>
  <text x="122" y="578" class="lightTitle">Spec</text>
  <text x="122" y="604" class="lightBody">사전고정</text>

  <rect x="304" y="544" rx="18" ry="18" width="172" height="84" fill="#eef5ee" stroke="#c9d9cb"/>
  <text x="328" y="578" class="lightTitle">Data</text>
  <text x="328" y="604" class="lightBody">출처·결측 기록</text>

  <rect x="510" y="544" rx="18" ry="18" width="172" height="84" fill="#eef5ee" stroke="#c9d9cb"/>
  <text x="534" y="578" class="lightTitle">Model</text>
  <text x="534" y="604" class="lightBody">AUC·Recall·CI</text>

  <rect x="716" y="544" rx="18" ry="18" width="172" height="84" fill="#eef5ee" stroke="#c9d9cb"/>
  <text x="740" y="578" class="lightTitle">Disposition</text>
  <text x="740" y="604" class="lightBody">Triage 운영점</text>

  <rect x="922" y="544" rx="18" ry="18" width="172" height="84" fill="#eef5ee" stroke="#c9d9cb"/>
  <text x="946" y="578" class="lightTitle">Gate</text>
  <text x="946" y="604" class="lightBody">산식 검증</text>

  <line x1="270" y1="586" x2="304" y2="586" stroke="#6a8a74" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="476" y1="586" x2="510" y2="586" stroke="#6a8a74" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="682" y1="586" x2="716" y2="586" stroke="#6a8a74" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="888" y1="586" x2="922" y2="586" stroke="#6a8a74" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="64" y="716" class="note">핵심 운영값: 23,404건 평가 가능 알림 중 9,362건 자동검증 종결, 검토시간 40% 단축, 놓친 산불 24건(302건 중 7.95%), 상위 20% 큐 산불 집중도 2.50배</text>
</svg>
